<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
  <title>Paxxmo - Digital Agency | Web Design, Branding & Development</title>
  <meta name="description"
    content="Paxxmo is a digital agency shaping bold ideas into strong experiences. We specialize in web design, mobile app development, branding, and digital marketing." />
  <meta name="author" content="Nimsara Liyanage" />
  <meta name="keywords"
    content="digital agency, web design, web development, branding, mobile apps, UX design, digital marketing, San Francisco" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://paxxmo.com" />

  <!-- Open Graph -->
  <meta property="og:title" content="Paxxmo - Digital Agency | Web Design, Branding & Development" />
  <meta property="og:description"
    content="Paxxmo is a digital agency shaping bold ideas into strong experiences. We design with purpose." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://paxxmo.com" />
  <meta property="og:image" content="https://paxxmo.com/og-image.png" />
  <meta property="og:site_name" content="Paxxmo" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@paxxmo" />
  <meta name="twitter:title" content="Paxxmo - Digital Agency" />
  <meta name="twitter:description" content="A digital agency shaping bold ideas into strong experiences." />
  <meta name="twitter:image" content="https://paxxmo.com/og-image.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Paxxmo",
      "url": "https://paxxmo.com",
      "logo": "https://paxxmo.com/paxxmo_logo_1.png",
      "description": "Paxxmo is a full-service IT and digital solutions company in Sri Lanka providing web development, mobile app development, digital marketing, and software development services.",
      "foundingDate": "2023",
      "areaServed": ["Sri Lanka", "Colombo", "Kandy", "Galle"],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "LK",
        "addressRegion": "Western Province",
        "addressLocality": "Colombo"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Sinhala"],
        "url": "https://paxxmo.com/#contact"
      },
      "sameAs": [
        "https://facebook.com/paxxmo",
        "https://instagram.com/paxxmo",
        "https://linkedin.com/company/paxxmo",
        "https://twitter.com/paxxmo"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "IT Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Web Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Mobile App Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Digital Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Software Development" } }
        ]
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
